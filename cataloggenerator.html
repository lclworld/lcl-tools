<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LCL Packaging Catalog Generator</title>
<style>


/* ── Acherus Grotesque with system fallbacks ── */
:root {
  --brown: #5c4a32;
  --dark: #3a2e20;
  --orange: #e07830;
  --cream: #f5f0e8;
  --light: #fdfcfa;
  --border: rgba(92,74,50,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Acherus Grotesque', 'AcherusGrotesque', 'Trebuchet MS', 'Gill Sans MT', sans-serif;
  background: #ece8e0;
  color: #2a2218;
  min-height: 100vh;
}

/* ── TOP BAR ── */
#topbar {
  background: #f7f4ef;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(92,74,50,0.1);
  border-bottom: 1px solid rgba(92,74,50,0.12);
}
#topbar img { width: 48px; height: 48px; object-fit: contain; }
#topbar-text .title { color: #3a2e20; font-weight: 700; font-size: 16px; letter-spacing: 0.06em; }
#topbar-text .sub { color: rgba(92,74,50,0.5); font-size: 10px; letter-spacing: 0.15em; margin-top: 2px; }

/* ── PREVIEW TOOLBAR ── */
#preview-toolbar {
  display: none;
  background: var(--dark);
  padding: 10px 20px;
  position: sticky;
  top: 0;
  z-index: 200;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
#preview-toolbar.active { display: flex; }
#preview-toolbar .ptitle { color: white; font-weight: 700; font-size: 13px; letter-spacing: 0.08em; }
.pt-btn {
  background: transparent;
  color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  padding: 6px 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  transition: all 0.15s;
}
.pt-btn:hover { background: rgba(255,255,255,0.1); color: white; }
.pt-btn.primary { background: var(--orange); color: white; border-color: var(--orange); }
.pt-btn.primary:hover { background: #c96a22; }
.pt-btn.secondary { background: var(--brown); color: white; border-color: var(--brown); }

/* ── BUILDER ── */
#builder { max-width: 880px; margin: 0 auto; padding: 24px 16px 48px; }
#preview-area { display: none; }
#preview-area.active { display: block; }
#builder.hidden { display: none; }

/* ── CARDS ── */
.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(92,74,50,0.06);
  margin-bottom: 16px;
}
.card-header {
  background: var(--brown);
  color: white;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
}
.card-header .htitle { font-weight: 700; font-size: 13px; letter-spacing: 0.06em; }
.card-header .hbtns { display: flex; gap: 8px; align-items: center; }
.hbtn {
  background: rgba(255,255,255,0.15);
  color: white;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 4px;
  padding: 3px 10px;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
}
.hbtn:hover { background: rgba(255,255,255,0.25); }
.hbtn.danger { background: rgba(220,50,50,0.3); border-color: rgba(220,50,50,0.5); }
.htoggle { font-size: 12px; margin-left: 6px; }
.card-body { padding: 16px; display: none; }
.card-body.open { display: block; }

/* ── GRID ── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid2.full { grid-column: 1 / -1; }
.span2 { grid-column: 1 / -1; }

/* ── FIELDS ── */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-size: 10px; font-weight: 700; color: var(--brown);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.field input, .field select, .field textarea {
  width: 100%; padding: 8px 10px;
  border: 1px solid var(--border); border-radius: 6px;
  font-family: inherit; font-size: 13px;
  background: var(--light); color: #333;
  outline: none; transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--brown);
}
.field textarea { resize: vertical; min-height: 60px; }
.field .row { display: flex; gap: 6px; }
.field .row input { flex: 1; }
.field .row select { width: 80px; flex-shrink: 0; }
.dollar-wrap { position: relative; }
.dollar-wrap input { padding-left: 22px; }
.dollar-wrap::before {
  content: '$';
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--brown); font-weight: 600;
  font-size: 13px; pointer-events: none;
}
.section-divider {
  font-size: 10px; font-weight: 700; color: var(--brown);
  text-transform: uppercase; letter-spacing: 0.1em;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px; margin: 14px 0 10px;
  grid-column: 1 / -1;
}

/* ── IMAGE UPLOAD ── */
.img-drop-zone {
  border: 2px dashed rgba(92,74,50,0.3);
  border-radius: 8px; padding: 14px 12px;
  text-align: center; cursor: pointer;
  background: var(--cream); font-size: 12px;
  color: var(--brown); transition: all 0.2s;
}
.img-drop-zone:hover { border-color: var(--brown); background: #ede8e0; }
.img-drop-zone.full { cursor: not-allowed; opacity: 0.5; }
.img-thumbs { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.img-thumb { position: relative; }
.img-thumb img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); display: block; }
.img-thumb .rm-img {
  position: absolute; top: -6px; right: -6px;
  background: #c0392b; color: white; border: none;
  border-radius: 50%; width: 18px; height: 18px;
  font-size: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ── MULTI-SELECT DROPDOWN ── */
.ms-wrap { position: relative; }
.ms-trigger {
  width: 100%; padding: 8px 10px; text-align: left;
  border: 1px solid var(--border); border-radius: 6px;
  font-family: inherit; font-size: 13px;
  background: var(--light); color: #666; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
}
.ms-trigger:focus { border-color: var(--brown); outline: none; }
.ms-dropdown {
  display: none; position: absolute; top: 100%; left: 0; right: 0;
  background: white; border: 1px solid var(--border);
  border-radius: 6px; z-index: 100; max-height: 260px;
  overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  margin-top: 2px;
}
.ms-dropdown.open { display: block; }
.ms-group-label {
  font-size: 10px; font-weight: 700; color: var(--orange);
  text-transform: uppercase; letter-spacing: 0.1em;
  padding: 8px 12px 4px; background: #faf7f2;
  border-bottom: 1px solid var(--border);
}
.ms-option {
  padding: 7px 12px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: background 0.1s;
}
.ms-option:hover { background: var(--cream); }
.ms-option input[type=checkbox] { accent-color: var(--brown); }
.ms-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.chip {
  background: var(--brown); color: white;
  padding: 3px 8px; border-radius: 20px; font-size: 11px;
  display: flex; align-items: center; gap: 4px;
}
.chip button {
  background: none; border: none; color: rgba(255,255,255,0.7);
  cursor: pointer; font-size: 11px; padding: 0; line-height: 1;
}
.chip button:hover { color: white; }

/* ── COLOR PICKER ── */
.color-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.color-swatch-item {
  display: flex; align-items: center; gap: 4px;
  background: var(--cream); border-radius: 20px;
  padding: 3px 6px 3px 6px; border: 1px solid var(--border);
}
.color-swatch-item .dot {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.15); flex-shrink: 0;
}
.color-swatch-item .rm-color {
  background: none; border: none; color: #aaa;
  cursor: pointer; font-size: 11px; padding: 0; line-height: 1;
}
.color-swatch-item .rm-color:hover { color: #c0392b; }
.add-color-row {
  display: flex; gap: 8px; align-items: center; margin-top: 4px;
}
.add-color-row input[type=color] {
  width: 38px; height: 34px; border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; padding: 2px;
  background: white;
}

.add-color-row button {
  background: var(--brown); color: white; border: none;
  border-radius: 6px; padding: 7px 14px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700;
}
.color-label-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.color-label-row label { font-size: 10px; font-weight: 700; color: var(--brown); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
.color-label-row input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 12px; background: var(--light); }

/* ── GHS TOGGLE ── */
.toggle-row { display: flex; align-items: center; gap: 10px; }
.toggle {
  position: relative; width: 40px; height: 22px;
  cursor: pointer; flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; inset: 0;
  background: #ccc; border-radius: 22px; transition: 0.2s;
}
.slider::before {
  content: ''; position: absolute;
  width: 16px; height: 16px; border-radius: 50%;
  background: white; left: 3px; top: 3px; transition: 0.2s;
}
input:checked + .slider { background: var(--brown); }
input:checked + .slider::before { transform: translateX(18px); }

/* ── BOTTOM ACTIONS ── */
#bottom-actions {
  display: flex; justify-content: flex-end; gap: 10px;
  padding-top: 12px;
}
.btn {
  padding: 11px 28px; border: none; border-radius: 8px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.04em; transition: all 0.2s;
}
.btn:disabled { background: #ccc !important; cursor: not-allowed; box-shadow: none !important; }
.btn-primary { background: var(--brown); color: white; box-shadow: 0 4px 14px rgba(92,74,50,0.35); }
.btn-primary:hover:not(:disabled) { background: var(--dark); }
.btn-orange { background: var(--orange); color: white; box-shadow: 0 4px 14px rgba(224,120,48,0.35); }
.btn-orange:hover:not(:disabled) { background: #c96a22; }
.btn-add {
  background: var(--brown); color: white; border: none;
  border-radius: 6px; padding: 7px 16px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700;
}

/* ── INFO CARD ── */
#info-card .card-body { display: block; }

/* ── CATALOG HEADER ── */
.catalog-section-label {
  font-size: 10px; font-weight: 700; color: var(--brown);
  text-transform: uppercase; letter-spacing: 0.12em;
  margin-bottom: 8px;
}
#products-header {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 10px;
}

/* ── IFRAME PREVIEW ── */
#catalog-iframe {
  width: 860px; max-width: 100%;
  min-height: 1200px; border: none;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  display: block; margin: 24px auto;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <img id="lcl-logo-img" src="" alt="LCL Logo"/>
  <div id="topbar-text">
    <div class="title">LCL PACKAGING CATALOG GENERATOR</div>
    <div class="sub">LUEUR COSMETICS LAB</div>
  </div>
</div>

<!-- PREVIEW TOOLBAR -->
<div id="preview-toolbar">
  <button class="pt-btn" onclick="showBuilder()">← Back to Editor</button>
  <span class="ptitle" id="preview-title">CATALOG PREVIEW</span>
  <div style="display:flex;gap:8px;">
    <button class="pt-btn primary" onclick="downloadHTML()">⬇ Download HTML</button>
    <button class="pt-btn secondary" onclick="printCatalog()">🖨 Print / Save PDF</button>
  </div>
</div>

<!-- BUILDER -->
<div id="builder">

  <!-- CATALOG INFO -->
  <div class="card" id="info-card">
    <div class="card-header" onclick="toggleCard('info-body')">
      <span class="htitle">📋 CATALOG DETAILS</span>
      <span class="htoggle" id="info-toggle">▲</span>
    </div>
    <div class="card-body open" id="info-body">
      <div class="grid2">
        <div class="field">
          <label>Client / Brand Name *</label>
          <input type="text" id="client-name" placeholder="e.g. Timeless by JD"/>
        </div>
        <div class="field">
          <label>Catalog Year</label>
          <input type="text" id="catalog-year" value="2026"/>
        </div>
        <div class="field span2">
          <label>Cover Image (hero / feature image for the cover page)</label>
          <div class="img-drop-zone" id="cover-drop" onclick="document.getElementById('cover-file').click()" ondrop="handleCoverDrop(event)" ondragover="event.preventDefault()">
            📸 Drop cover image here or click to upload
          </div>
          <input type="file" id="cover-file" accept="image/*" style="display:none" onchange="handleCoverFile(event)"/>
          <div id="cover-preview" style="margin-top:8px;display:none;">
            <div style="position:relative;display:inline-block;">
              <img id="cover-img" style="height:80px;border-radius:6px;border:1px solid var(--border);"/>
              <button onclick="removeCover()" style="position:absolute;top:-6px;right:-6px;background:#c0392b;color:white;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:11px;">✕</button>
            </div>
          </div>
        </div>
        <div class="field">
          <label>Show GHS Pricing?</label>
          <div class="toggle-row">
            <label class="toggle">
              <input type="checkbox" id="show-ghs" onchange="toggleGHS()"/>
              <span class="slider"></span>
            </label>
            <span style="font-size:12px;color:#666;">Show both USD and GHS on catalog</span>
          </div>
        </div>
        <div class="field" id="ghs-rate-field" style="display:none;">
          <label>Exchange Rate (1 USD = ? GHS)</label>
          <input type="number" id="ghs-rate" placeholder="e.g. 16.5" step="0.1"/>
        </div>
      </div>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div id="products-header">
    <div class="catalog-section-label" id="products-count-label">📦 PACKAGING OPTIONS (1)</div>
    <button class="btn-add" onclick="addProduct()">+ Add Product</button>
  </div>
  <div id="products-container"></div>

  <!-- ACTIONS -->
  <div id="bottom-actions">
    <button class="btn btn-primary" id="btn-preview" onclick="previewCatalog()" disabled>👁 Preview Catalog</button>
    <button class="btn btn-orange" id="btn-generate" onclick="generateAndDownload()" disabled>⬇ Generate & Download</button>
  </div>
</div>

<!-- PREVIEW AREA -->
<div id="preview-area">
  <iframe id="catalog-iframe" title="Catalog Preview"></iframe>
</div>

// ── PRODUCT MANAGEMENT ──
function addProduct() {
  const id = nextId++;
  products.push({ id, name:'', refCode:'', packagingType:'', material:'Plastic', volume:'', volumeUnit:'ml', moq:'', unitCostPlain:'', unitCostPrinted:'', printedType:'fixed', bestFitFor:[], colorLabel:'Available Cap Colors', colors:[], boxOptions:'', notes:'', images:[] });
  renderProduct(id);
  updateProductsLabel();
  updateBtnState();
}

function removeProduct(id) {
  products = products.filter(p => p.id !== id);
  document.getElementById('prod-card-' + id).remove();
  updateProductsLabel();
  updateBtnState();
}

function duplicateProduct(id) {
  const orig = products.find(p => p.id === id);
  const nid = nextId++;
  const dup = JSON.parse(JSON.stringify(orig));
  dup.id = nid;
  products.push(dup);
  renderProduct(nid);
  updateProductsLabel();
}

function getProduct(id) { return products.find(p => p.id === id); }

function updateProductsLabel() {
  document.getElementById('products-count-label').textContent = '📦 PACKAGING OPTIONS (' + products.length + ')';
}

function updateBtnState() {
  const client = document.getElementById('client-name').value.trim();
  const hasProduct = products.some(p => p.name.trim());
  const ok = client && hasProduct;
  document.getElementById('btn-preview').disabled = !ok;
  document.getElementById('btn-generate').disabled = !ok;
}

function prodField(id, field) {
  const el = document.getElementById('pf-' + id + '-' + field);
  return el ? el.value : '';
}

// ── RENDER PRODUCT CARD ──
function renderProduct(id) {
  const p = getProduct(id);
  const container = document.getElementById('products-container');
  const div = document.createElement('div');
  div.className = 'card';
  div.id = 'prod-card-' + id;

  const packagingOpts = PACKAGING_TYPES.map(t => `<option value="${t}" ${p.packagingType===t?'selected':''}>${t}</option>`).join('');
  const volumeUnits = ['ml','oz','g','L','cm','mm'].map(u => `<option value="${u}" ${p.volumeUnit===u?'selected':''}>${u}</option>`).join('');

  div.innerHTML = `
    <div class="card-header" onclick="toggleCard('prod-body-${id}', 'prod-toggle-${id}')">
      <span class="htitle" id="prod-title-${id}">PRODUCT #${products.findIndex(x=>x.id===id)+1}${p.name ? ' — ' + p.name.toUpperCase() : ''}</span>
      <div class="hbtns">
        <button class="hbtn" onclick="event.stopPropagation();duplicateProduct(${id})">Duplicate</button>
        ${products.length > 1 ? `<button class="hbtn danger" onclick="event.stopPropagation();removeProduct(${id})">Remove</button>` : ''}
        <span class="htoggle" id="prod-toggle-${id}">▲</span>
      </div>
    </div>
    <div class="card-body open" id="prod-body-${id}">
      <div class="grid2">

        <!-- IMAGES -->
        <div class="span2">
          <div class="field">
            <label>Product Images (up to 4)</label>
            <div class="img-drop-zone" id="img-drop-${id}"
              onclick="document.getElementById('img-file-${id}').click()"
              ondrop="handleImgDrop(event,${id})"
              ondragover="event.preventDefault()">
              📷 Drop images here or click to upload (<span id="img-count-${id}">0</span>/4)
            </div>
            <input type="file" id="img-file-${id}" accept="image/*" multiple style="display:none"
              onchange="handleImgFiles(event,${id})"/>
            <div class="img-thumbs" id="img-thumbs-${id}"></div>
          </div>
        </div>

        <div class="section-divider">Basic Information</div>

        <div class="field">
          <label>Packaging Name *</label>
          <input type="text" id="pf-${id}-name" value="${p.name}" placeholder="e.g. Frosted Jar"
            oninput="updateProdField(${id},'name',this.value)"/>
        </div>
        <div class="field">
          <label>Reference Code</label>
          <input type="text" id="pf-${id}-refCode" value="${p.refCode}" placeholder="e.g. RT1001"
            oninput="updateProdField(${id},'refCode',this.value)"/>
        </div>
        <div class="field">
          <label>Packaging Type</label>
          <select id="pf-${id}-packagingType" onchange="updateProdField(${id},'packagingType',this.value)">
            <option value="">Select type...</option>${packagingOpts}
          </select>
        </div>
        <div class="field">
          <label>Material</label>
          <input type="text" id="pf-${id}-material" value="${p.material}" placeholder="Plastic, Glass, PU Leather..."
            oninput="updateProdField(${id},'material',this.value)"/>
        </div>
        <div class="field">
          <label>Volume / Size</label>
          <div class="row">
            <input type="text" id="pf-${id}-volume" value="${p.volume}" placeholder="e.g. 7 or 50ml, 100ml"
              oninput="updateProdField(${id},'volume',this.value)"/>
            <select id="pf-${id}-volumeUnit" onchange="updateProdField(${id},'volumeUnit',this.value)">${volumeUnits}</select>
          </div>
        </div>



        <div class="section-divider">Pricing & Order</div>

        <div class="field">
          <label>MOQ (Minimum Order Quantity) *</label>
          <input type="number" id="pf-${id}-moq" value="${p.moq}" placeholder="e.g. 500"
            oninput="updateProdField(${id},'moq',this.value)"/>
        </div>

        <div class="field">
          <label>Unit Cost — Without Design Print (USD)</label>
          <div class="dollar-wrap">
            <input type="number" id="pf-${id}-unitCostPlain" value="${p.unitCostPlain}" placeholder="1.01" step="0.01"
              oninput="updateProdField(${id},'unitCostPlain',this.value)"/>
          </div>
        </div>
        <div class="field">
          <label>Unit Cost — With Design Print</label>
          <div class="row">
            <div id="printed-input-wrap-${id}" class="dollar-wrap" style="flex:1">
              <input type="number" id="pf-${id}-unitCostPrinted" value="${p.unitCostPrinted}" placeholder="1.41" step="0.01"
                oninput="updateProdField(${id},'unitCostPrinted',this.value)" style="width:100%"/>
            </div>
            <select id="pf-${id}-printedType" style="width:180px;" onchange="updatePrintedType(${id},this.value)">
              <option value="fixed">Fixed price</option>
              <option value="logo">Depends on logo colors</option>
              <option value="none">Does not support</option>
              <option value="custom">Custom text</option>
            </select>
          </div>
        </div>

        <div class="section-divider">Product Details</div>

        <!-- BEST FIT FOR -->
        <div class="field span2" id="bestfit-field-${id}">
          <label>Best Fit For</label>
          <div class="ms-wrap">
            <button class="ms-trigger" type="button" onclick="toggleDropdown(${id})">
              <span id="ms-placeholder-${id}">Select product types...</span>
              <span>▼</span>
            </button>
            <div class="ms-dropdown" id="ms-dd-${id}">
              ${BEST_FIT_GROUPS.map(g => `
                <div class="ms-group-label">${g.group}</div>
                ${g.items.map(item => `
                  <label class="ms-option">
                    <input type="checkbox" value="${item}" onchange="toggleBestFit(${id},'${item}',this.checked)"/>
                    ${item}
                  </label>`).join('')}
              `).join('')}
              <div class="ms-group-label">Other</div>
              <div style="padding:8px 12px;display:flex;gap:6px;">
                <input type="text" id="bf-other-${id}" placeholder="Type and press Enter..." style="flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:inherit;"
                  onkeydown="addOtherBestFit(event,${id})"/>
              </div>
            </div>
          </div>
          <div class="ms-chips" id="bf-chips-${id}"></div>
        </div>

        <!-- COLORS -->
        <div class="field span2">
          <div class="color-label-row">
            <label>Color Section Label</label>
            <input type="text" id="pf-${id}-colorLabel" value="${p.colorLabel}"

          </div>
          <div class="color-list" id="color-list-${id}"></div>
          <div class="add-color-row">
            <input type="color" id="color-pick-${id}" value="#5c4a32"/>
            
            <button onclick="addColor(${id})">+ Add</button>
          </div>
        </div>

        <div class="section-divider">Additional Details</div>

        <div class="field span2">
          <label>Box / Packaging Options (optional)</label>
          <textarea id="pf-${id}-boxOptions" placeholder="e.g. White box available, custom printed box at +$0.30/unit"
            oninput="updateProdField(${id},'boxOptions',this.value)">${p.boxOptions}</textarea>
        </div>
        <div class="field span2">
          <label>Additional Notes / Specifications</label>
          <textarea id="pf-${id}-notes" placeholder="e.g. Leak-proof wiper included, available with keychain..."
            oninput="updateProdField(${id},'notes',this.value)">${p.notes}</textarea>
        </div>
      </div>
    </div>`;

  container.appendChild(div);

  // Close dropdown when clicking outside
  document.addEventListener('click', function handler(e) {
    const dd = document.getElementById('ms-dd-' + id);
    if (dd && !dd.contains(e.target) && !e.target.closest('#bestfit-field-' + id + ' .ms-trigger')) {
      dd.classList.remove('open');
    }
  });
}

// ── FIELD UPDATES ──
function updateProdField(id, field, val) {
  const p = getProduct(id);
  if (!p) return;
  p[field] = val;
  if (field === 'name') {
    const idx = products.findIndex(x => x.id === id) + 1;
    document.getElementById('prod-title-' + id).textContent = 'PRODUCT #' + idx + (val ? ' — ' + val.toUpperCase() : '');
  }
  updateBtnState();
}

function updatePrintedType(id, val) {
  const p = getProduct(id);
  p.printedType = val;
  const wrap = document.getElementById('printed-input-wrap-' + id);
  const inp = document.getElementById('pf-' + id + '-unitCostPrinted');
  if (val === 'fixed') {
    wrap.className = 'dollar-wrap';
    inp.type = 'number';
    inp.placeholder = '1.41';
    inp.disabled = false;
  } else if (val === 'custom') {
    wrap.className = '';
    inp.type = 'text';
    inp.placeholder = 'Enter text...';
    inp.disabled = false;
  } else {
    wrap.className = '';
    inp.type = 'text';
    inp.value = val === 'logo' ? 'Depends on logo colors' : 'Does not support';
    inp.disabled = true;
    p.unitCostPrinted = inp.value;
  }
}

// ── CARD TOGGLE ──
function toggleCard(bodyId, toggleId) {
  const body = document.getElementById(bodyId);
  const tog = toggleId ? document.getElementById(toggleId) : null;
  if (!body) return;
  body.classList.toggle('open');
  if (tog) tog.textContent = body.classList.contains('open') ? '▲' : '▼';
}

// ── COVER IMAGE ──
function handleCoverDrop(e) {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) setCoverImage(file);
}
function handleCoverFile(e) {
  const file = e.target.files[0];
  if (file) setCoverImage(file);
}
function setCoverImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    coverImageSrc = ev.target.result;
    document.getElementById('cover-img').src = coverImageSrc;
    document.getElementById('cover-preview').style.display = 'block';
    document.getElementById('cover-drop').style.display = 'none';
  };
  reader.readAsDataURL(file);
}
function removeCover() {
  coverImageSrc = null;
  document.getElementById('cover-img').src = '';
  document.getElementById('cover-preview').style.display = 'none';
  document.getElementById('cover-drop').style.display = 'block';
  document.getElementById('cover-file').value = '';
}

// ── GHS ──
function toggleGHS() {
  const on = document.getElementById('show-ghs').checked;
  document.getElementById('ghs-rate-field').style.display = on ? 'block' : 'none';
}

// ── IMAGE UPLOADS ──
function handleImgDrop(e, id) {
  e.preventDefault();
  handleImgFileList(e.dataTransfer.files, id);
}
function handleImgFiles(e, id) {
  handleImgFileList(e.target.files, id);
}
function handleImgFileList(files, id) {
  const p = getProduct(id);
  const remaining = 4 - p.images.length;
  const toAdd = Array.from(files).slice(0, remaining);
  toAdd.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      p.images.push({ src: ev.target.result, name: file.name });
      renderImgThumbs(id);
    };
    reader.readAsDataURL(file);
  });
}
function removeImg(id, idx) {
  const p = getProduct(id);
  p.images.splice(idx, 1);
  renderImgThumbs(id);
}
function renderImgThumbs(id) {
  const p = getProduct(id);
  const cnt = document.getElementById('img-count-' + id);
  const thumbs = document.getElementById('img-thumbs-' + id);
  const drop = document.getElementById('img-drop-' + id);
  if (cnt) cnt.textContent = p.images.length;
  if (drop) drop.className = 'img-drop-zone' + (p.images.length >= 4 ? ' full' : '');
  if (thumbs) {
    thumbs.innerHTML = p.images.map((img, i) => `
      <div class="img-thumb">
        <img src="${img.src}" alt="${img.name}"/>
        <button class="rm-img" onclick="removeImg(${id},${i})">✕</button>
      </div>`).join('');
  }
}

// ── BEST FIT DROPDOWN ──
function toggleDropdown(id) {
  document.getElementById('ms-dd-' + id).classList.toggle('open');
}
function toggleBestFit(id, item, checked) {
  const p = getProduct(id);
  if (checked) {
    if (!p.bestFitFor.includes(item)) p.bestFitFor.push(item);
  } else {
    p.bestFitFor = p.bestFitFor.filter(x => x !== item);
  }
  renderBFChips(id);
}
function removeBestFit(id, item) {
  const p = getProduct(id);
  p.bestFitFor = p.bestFitFor.filter(x => x !== item);
  const cb = document.querySelector(`#ms-dd-${id} input[value="${item}"]`);
  if (cb) cb.checked = false;
  renderBFChips(id);
}
function addOtherBestFit(e, id) {
  if (e.key === 'Enter') {
    const inp = document.getElementById('bf-other-' + id);
    const val = inp.value.trim();
    if (val) {
      const p = getProduct(id);
      if (!p.bestFitFor.includes(val)) p.bestFitFor.push(val);
      renderBFChips(id);
      inp.value = '';
    }
  }
}
function renderBFChips(id) {
  const p = getProduct(id);
  const chips = document.getElementById('bf-chips-' + id);
  const ph = document.getElementById('ms-placeholder-' + id);
  if (chips) chips.innerHTML = p.bestFitFor.map(item => `
    <span class="chip">${item}<button onclick="removeBestFit(${id},'${item}')">✕</button></span>`).join('');
  if (ph) ph.textContent = p.bestFitFor.length ? p.bestFitFor.length + ' selected' : 'Select product types...';
}

// ── COLORS ──
function addColor(id) {
  const p = getProduct(id);
  const hex = document.getElementById('color-pick-' + id).value;
  p.colors.push({ hex, name: hex });
  renderColors(id);
}
function removeColor(id, idx) {
  const p = getProduct(id);
  p.colors.splice(idx, 1);
  renderColors(id);
}
function renderColors(id) {
  const p = getProduct(id);
  const list = document.getElementById('color-list-' + id);
  if (!list) return;
  list.innerHTML = p.colors.map((c, i) => `
    <div class="color-swatch-item">
      <div class="dot" style="background:${c.hex};"></div>
      <button class="rm-color" onclick="removeColor(${id},${i})">✕</button>
    </div>`).join('');
}

// ── GHS CALCULATION ──
function toGHS(usdStr) {
  const rate = parseFloat(document.getElementById('ghs-rate').value) || 0;
  const usd = parseFloat(usdStr);
  if (!rate || isNaN(usd)) return null;
  return (usd * rate).toFixed(2);
}

// ── CATALOG HTML GENERATION ──
function buildCatalogHTML() {
  const clientName = document.getElementById('client-name').value.trim();
  const year = document.getElementById('catalog-year').value.trim() || '2026';
  const showGHS = document.getElementById('show-ghs').checked;

  function priceStr(usd) {
    if (!usd) return '—';
    const g = showGHS ? toGHS(usd) : null;
    return '$' + parseFloat(usd).toFixed(2) + (g ? ' / GHS ' + g : '');
  }

  const logoDataURL = 'data:image/png;base64,' + LCL_LOGO_B64;

  const coverBg = coverImageSrc
    ? `background-image:url('${coverImageSrc}');background-size:cover;background-position:center;`
    : `background:#f0ede8;`;

  const productPages = products.filter(p => p.name.trim()).map((p, idx) => {
    const hasImages = p.images && p.images.length > 0;
    const imgGrid = hasImages
      ? p.images.map(img => `<div style="overflow:hidden;border-radius:6px;background:#f0ede8;border:1px solid rgba(0,0,0,0.08);aspect-ratio:4/3;"><img src="${img.src}" style="width:100%;height:100%;object-fit:cover;"/></div>`).join('')
      : `<div style="aspect-ratio:4/3;background:#eee;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:12px;border:1px dashed #ccc;">No image uploaded</div>`;

    const imgCols = hasImages && p.images.length === 1 ? '1fr' : '1fr 1fr';

    const colorSwatches = p.colors.map(c =>
      `<span style="display:inline-block;width:16px;height:16px;border-radius:50%;background:${c.hex};border:1px solid rgba(0,0,0,0.12);margin-right:3px;vertical-align:middle;" title="${c.name}"></span>`
    ).join('');

    const printedDisplay = p.printedType === 'fixed' && p.unitCostPrinted
      ? priceStr(p.unitCostPrinted)
      : p.unitCostPrinted || (p.printedType === 'logo' ? 'Depends on logo colors' : p.printedType === 'none' ? 'Does not support' : '—');

    const specLines = [
      p.bestFitFor.length ? ['Best Fit For', p.bestFitFor.join(', ')] : null,
      p.material ? ['Material', p.material] : null,
      p.volume ? ['Volume / Size', p.volume + (p.volumeUnit && !p.volume.includes(p.volumeUnit) ? p.volumeUnit : '')] : null,
      p.refCode ? ['Ref Code', p.refCode] : null,
      p.moq ? ['Minimum Order Quantity', p.moq] : null,
    ].filter(Boolean);

    const pricingLines = [
      p.unitCostPlain ? ['Unit Cost (without design print)', priceStr(p.unitCostPlain)] : null,
      ['Unit Cost (with design print)', printedDisplay],
    ].filter(Boolean);

    const pNum = String(idx + 1).padStart(2, '0');
    const introBg = hasImages ? `background:url('${p.images[0].src}') center/cover no-repeat;` : 'background:#1a1510;';

    return `
    <!-- PRODUCT ${pNum} INTRO -->
    <div class="pg" style="${introBg}position:relative;">
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.25) 0%,rgba(0,0,0,0.6) 100%);"></div>
      <div style="position:relative;z-index:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%;padding:36px;">
        
        <div style="font-size:36px;font-weight:300;color:rgba(255,255,255,0.65);text-transform:uppercase;letter-spacing:0.08em;line-height:1;">${p.packagingType || ''}</div>
        <div style="font-size:58px;font-weight:700;color:white;text-transform:uppercase;letter-spacing:-0.01em;line-height:1;margin-top:-4px;">${p.name.toUpperCase()}</div>
      </div>
      <div style="position:absolute;bottom:14px;left:20px;font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;">FOR ${clientName.toUpperCase()}</div>
      <div style="position:absolute;bottom:14px;right:20px;font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;">PAGE ${idx * 2 + 3} &nbsp; @LUEURCOSMETICSLAB</div>
    </div>

    <!-- PRODUCT ${pNum} DETAIL -->
    <div class="pg" style="display:flex;flex-direction:column;">
      <div style="background:#5c4a32;padding:13px 22px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span style="font-size:17px;font-weight:300;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.12em;">${p.packagingType || ''}</span>
          <span style="font-size:22px;font-weight:700;color:white;text-transform:uppercase;letter-spacing:0.02em;">${p.name.toUpperCase()}</span>
        </div>
        <img src="${logoDataURL}" style="width:40px;height:40px;object-fit:contain;"/>
      </div>

      <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:18px 22px;overflow:hidden;">
        <div style="display:grid;grid-template-columns:${imgCols};gap:8px;align-content:start;">${imgGrid}</div>
        <div style="display:flex;flex-direction:column;gap:10px;overflow:hidden;">
          <div style="background:#5c4a32;width:100px;height:8px;border-radius:2px;"></div>

          <div style="background:#f5f1eb;border-radius:6px;padding:8px 12px;display:inline-block;">
            <span style="font-size:11px;font-weight:700;color:#5c4a32;text-transform:uppercase;letter-spacing:0.08em;">Product #${pNum}</span>
          </div>

          <div style="font-size:12.5px;color:#2a2218;line-height:1.9;">
            ${specLines.map(([k,v]) => `<div><strong style="color:#3a2e20;">${k}:</strong> ${v}</div>`).join('')}
          </div>

          <div style="border-top:1px solid rgba(92,74,50,0.15);padding-top:10px;font-size:12.5px;color:#2a2218;line-height:1.9;">
            ${pricingLines.map(([k,v]) => `<div>${k}: <strong>${v}</strong></div>`).join('')}
          </div>

          ${p.colors.length ? `
          <div style="border-top:1px solid rgba(92,74,50,0.15);padding-top:10px;">
            <div style="font-size:10px;font-weight:700;color:#5c4a32;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:7px;">${p.colorLabel}</div>
            <div>${colorSwatches}</div>
          </div>` : ''}

          ${p.boxOptions ? `
          <div style="border-top:1px solid rgba(92,74,50,0.15);padding-top:8px;">
            <div style="font-size:10px;font-weight:700;color:#5c4a32;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">Box Options</div>
            <div style="font-size:12px;color:#555;line-height:1.5;">${p.boxOptions}</div>
          </div>` : ''}

          ${p.notes ? `
          <div style="border-top:1px solid rgba(92,74,50,0.15);padding-top:8px;">
            <div style="font-size:10px;font-weight:700;color:#5c4a32;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">Notes</div>
            <div style="font-size:12px;color:#555;line-height:1.5;">${p.notes}</div>
          </div>` : ''}
        </div>
      </div>

      <div style="padding:7px 22px;border-top:1px solid rgba(92,74,50,0.1);display:flex;justify-content:space-between;font-size:9px;color:#aaa;letter-spacing:0.08em;flex-shrink:0;">
        <span>${clientName.toUpperCase()}</span>
        <span>PAGE ${idx * 2 + 4} &nbsp;&nbsp; @LUEURCOSMETICSLAB</span>
      </div>
    </div>`;
  }).join('\n');

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>LCL Packaging Catalog — ${clientName} ${year}</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Acherus Grotesque','AcherusGrotesque','Trebuchet MS','Gill Sans MT',sans-serif;background:#ddd;}
.pg{width:210mm;min-height:297mm;background:white;margin:0 auto;position:relative;overflow:hidden;page-break-after:always;}
@media print{body{background:white;}.pg{margin:0;box-shadow:none;page-break-after:always;}}
</style>
</head>
<body>

<!-- COVER -->
<div class="pg" style="display:flex;flex-direction:column;${coverBg}">

// ── ACTIONS ──
let lastHTML = '';

function previewCatalog() {
  lastHTML = buildCatalogHTML();
  document.getElementById('builder').classList.add('hidden');
  document.getElementById('preview-area').classList.add('active');
  document.getElementById('preview-toolbar').classList.add('active');
  document.getElementById('topbar').style.display = 'none';
  const clientName = document.getElementById('client-name').value.trim();
  document.getElementById('preview-title').textContent = 'CATALOG PREVIEW — ' + clientName.toUpperCase();
  const iframe = document.getElementById('catalog-iframe');
  iframe.srcdoc = lastHTML;
}

function showBuilder() {
  document.getElementById('builder').classList.remove('hidden');
  document.getElementById('preview-area').classList.remove('active');
  document.getElementById('preview-toolbar').classList.remove('active');
  document.getElementById('topbar').style.display = 'flex';
}

function downloadHTML() {
  const html = lastHTML || buildCatalogHTML();
  const clientName = document.getElementById('client-name').value.trim().replace(/\s+/g,'_');
  const year = document.getElementById('catalog-year').value.trim() || '2026';
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `LCL_Catalog_${clientName}_${year}.html`;
  a.click();
  URL.revokeObjectURL(url);
}

function generateAndDownload() {
  lastHTML = buildCatalogHTML();
  downloadHTML();
  previewCatalog();
}

function printCatalog() {
  const html = lastHTML || buildCatalogHTML();
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.onload = () => { setTimeout(() => win.print(), 300); };
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Formula Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Garet';
    src: url('https://db.onlinewebfonts.com/t/32441756BFBA881E85E5A7A3522A8524.woff2') format('woff2');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Garet';
    src: url('https://db.onlinewebfonts.com/t/5FA4B4BF81FBE0F85CF916E97AEABDE1.woff2') format('woff2');
    font-weight: 700;
  }

  :root {
    --orange: #FF914D;
    --cream:  #FBF8EF;
    --yellow: #FFDE59;
    --black:  #000000;
    --brown:  #5B4239;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--black);
    font-family: 'Garet', 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 40px 20px 60px;
  }

  .container { max-width: 920px; margin: 0 auto; }

  header { margin-bottom: 36px; }

  .lab-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: var(--brown);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .lab-tag::before {
    content: '';
    width: 28px; height: 2px;
    background: var(--orange);
    border-radius: 2px;
    display: inline-block;
  }

  h1 {
    font-family: 'Garet', 'Plus Jakarta Sans', sans-serif;
    font-size: 44px;
    font-weight: 700;
    color: var(--black);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  h1 .hi { color: var(--orange); }

  .subtitle { color: var(--brown); margin-top: 8px; font-size: 13px; }

  .mode-toggle { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
  .mode-btn {
    padding: 10px 26px;
    border: 2px solid var(--black);
    background: transparent;
    color: var(--black);
    font-family: 'Garet', 'Plus Jakarta Sans', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border-radius: 100px; transition: all 0.16s;
  }
  .mode-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }
  .mode-btn:not(.active):hover { background: var(--yellow); border-color: var(--yellow); }

  .panel {
    background: #fff;
    border: 2px solid var(--black);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 5px 5px 0 var(--black);
  }

  .panel-header {
    padding: 15px 22px;
    border-bottom: 2px solid var(--black);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--yellow); gap: 12px; flex-wrap: wrap;
  }
  .panel-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }

  .batch-row {
    padding: 14px 22px;
    border-bottom: 2px solid var(--black);
    display: flex; align-items: center; gap: 14px;
    background: #fffaf4; flex-wrap: wrap;
  }
  .batch-row label {
    font-size: 11px; font-weight: 700; color: var(--brown);
    text-transform: uppercase; letter-spacing: 0.12em; white-space: nowrap;
  }
  .batch-row input {
    width: 130px;
    background: var(--cream);
    border: 2px solid var(--black); border-radius: var(--radius);
    color: var(--orange);
    font-family: 'Garet', 'Plus Jakarta Sans', sans-serif;
    font-size: 16px; font-weight: 700;
    padding: 7px 12px; outline: none; transition: border-color 0.16s;
  }
  .batch-row input:focus { border-color: var(--orange); }

  .unit-select {
    background: var(--cream);
    border: 2px solid var(--black); border-radius: var(--radius);
    color: var(--brown);
    font-family: 'Garet', 'Plus Jakarta Sans', sans-serif;
    font-size: 13px; font-weight: 700;
    padding: 7px 12px; outline: none; cursor: pointer;
  }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 11px 14px;
    font-family: 'Garet', 'Plus Jakarta Sans', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--brown); text-align: left;
    border-bottom: 2px solid var(--black);
    background: var(--cream); white-space: nowrap;
  }

  tbody tr { border-bottom: 1px solid #ede5d8; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fffaf4; }
  tbody td { padding: 7px 14px; vertical-align: middle; }

  input.cell-input {
    background: transparent;
    border: 1.5px solid transparent; border-radius: 6px;
    color: var(--black);
    font-family: 'Garet', 'Plus Jakarta Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 5px 8px; width: 100%; outline: none;
    transition: border-color 0.16s, background 0.16s;
    /* critical for iOS: don't let Safari do anything funny */
    -webkit-appearance: none;
  }
  input.cell-input:focus { border-color: var(--orange); background: #fffaf4; }
  input.cell-input.num-input { text-align: right; color: var(--brown); font-weight: 700; }
  input.cell-input.num-input:focus { color: var(--orange); }
  input.cell-input::placeholder { color: #c5bdb0; }

  .cell-readonly {
    font-family: 'Garet', 'Plus Jakarta Sans', sans-serif;
    font-size: 13px; font-weight: 700;
    text-align: right; display: block; color: var(--orange);
  }

  .pct-bar-wrap { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }
  .pct-bar { width: 52px; height: 5px; background: #e8ddd0; border-radius: 3px; overflow: hidden; flex-shrink: 0; }
  .pct-bar-fill { height: 100%; background: var(--orange); border-radius: 3px; transition: width 0.3s ease; }

  .del-btn {
    background: none; border: 1.5px solid transparent;
    color: #c5bdb0; cursor: pointer;
    padding: 4px 8px; border-radius: 6px;
    font-size: 13px; font-weight: 700; transition: all 0.16s;
    display: flex; align-items: center;
  }
  .del-btn:hover { color: #e03030; border-color: #e03030; background: #fff0f0; }

  .add-row { padding: 14px 22px; border-top: 2px solid var(--black); }
  .add-btn {
    background: none; border: 2px dashed #c5bdb0; border-radius: var(--radius);
    color: var(--brown);
    font-family: 'Garet', 'Plus Jakarta Sans', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 9px 20px; cursor: pointer; transition: all 0.16s; width: 100%;
  }
  .add-btn:hover { border-color: var(--orange); color: var(--orange); background: #fffaf4; }

  .clear-btn {
    background: none; border: 2px solid var(--black); border-radius: 100px;
    color: var(--black);
    font-family: 'Garet', 'Plus Jakarta Sans', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 5px 14px; cursor: pointer; transition: all 0.16s;
  }
  .clear-btn:hover { border-color: #e03030; color: #e03030; }

  .summary {
    background: var(--orange);
    border: 2px solid var(--black); border-radius: 14px;
    padding: 24px;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px; box-shadow: 5px 5px 0 var(--black); margin-bottom: 16px;
  }
  .stat { display: flex; flex-direction: column; gap: 5px; }
  .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.75); }
  .stat-value { font-family: 'Garet', 'Plus Jakarta Sans', sans-serif; font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
  .stat-value span { font-size: 14px; opacity: 0.7; }
  .stat-value.ok { color: var(--yellow); }
  .stat-value.warn { color: var(--black); }

  .warning-bar {
    background: #fff0f0; border: 2px solid #e03030; border-radius: var(--radius);
    padding: 12px 18px; font-size: 12px; font-weight: 700; color: #e03030; display: none;
  }
  .warning-bar.show { display: block; }

  .hidden { display: none !important; }
  .row-num { color: #c5bdb0; font-size: 11px; font-weight: 700; padding-left: 20px !important; }

  /* row unit select inside table */
  select.row-unit {
    background: var(--cream); border: 1.5px solid #ddd5c8; border-radius: 6px;
    color: var(--brown);
    font-family: 'Garet', 'Plus Jakarta Sans', sans-serif;
    font-size: 12px; font-weight: 700;
    padding: 5px 8px; outline: none; cursor: pointer; width: 100%;
  }

  @media (max-width: 600px) {
    h1 { font-size: 30px; }
    .pct-bar { display: none; }
    .summary { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="lab-tag">Cosmetic Lab Tools</div>
    <h1>Formula <span class="hi">Calculator</span></h1>
    <p class="subtitle">Two-way calculator — quantities ↔ percentages</p>
  </header>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btnQty" onclick="setMode('qty')">Qty → %</button>
    <button class="mode-btn" id="btnPct" onclick="setMode('pct')">% → Qty</button>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title" id="panelTitle">Enter quantities — percentages calculated automatically</span>
      <button class="clear-btn" onclick="clearAll()">Clear All</button>
    </div>

    <div class="batch-row hidden" id="batchRow">
      <label>Batch Size</label>
      <input type="text" inputmode="decimal" id="batchSize" placeholder="e.g. 500" />
      <select class="unit-select" id="batchUnit">
        <option>g</option><option>kg</option><option>oz</option>
        <option>lb</option><option>mL</option><option>L</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:44px">#</th>
            <th>Ingredient / Phase</th>
            <th id="colQtyLabel" style="width:150px;text-align:right">Quantity</th>
            <th id="colUnitLabel" style="width:76px;text-align:center">Unit</th>
            <th id="colPctLabel" style="width:150px;text-align:right">% of Total</th>
            <th id="colCalcLabel" class="hidden" style="width:160px;text-align:right">Batch Qty</th>
            <th style="width:44px"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="add-row">
      <button class="add-btn" onclick="addRow()">+ Add Ingredient</button>
    </div>
  </div>

  <div class="summary">
    <div class="stat">
      <span class="stat-label">Total Quantity</span>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat">
      <span class="stat-label">Total %</span>
      <div class="stat-value" id="statPct">—</div>
    </div>
    <div class="stat">
      <span class="stat-label">Ingredients</span>
      <div class="stat-value" id="statCount">0</div>
    </div>
    <div class="stat hidden" id="statBatchWrap">
      <span class="stat-label">Batch Size</span>
      <div class="stat-value" id="statBatch">—</div>
    </div>
  </div>

  <div class="warning-bar" id="warnBar"></div>
</div>

<script>
  let mode = 'qty';
  let rows = [];   // { id, name, val, unit }
  let nextId = 1;

  /* ─── Helpers ─── */
  function parseVal(str) {
    const n = parseFloat(String(str ?? '').replace(',', '.').trim());
    return isNaN(n) ? 0 : n;
  }
  function fmt(n) { return parseFloat(n.toFixed(4)).toString(); }

  /* Strip anything that isn't a digit or a single decimal point.
     Called only on blur — never during active typing — so the keyboard stays open. */
  function sanitizeOnBlur(input) {
    let v = input.value.replace(',', '.');
    v = v.replace(/[^0-9.]/g, '');
    const parts = v.split('.');
    if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
    input.value = v;
  }

  /* ─── Mode ─── */
  function setMode(m) {
    mode = m;
    document.getElementById('btnQty').classList.toggle('active', m === 'qty');
    document.getElementById('btnPct').classList.toggle('active', m === 'pct');
    document.getElementById('batchRow').classList.toggle('hidden', m === 'qty');
    document.getElementById('statBatchWrap').classList.toggle('hidden', m === 'qty');

    if (m === 'qty') {
      document.getElementById('colQtyLabel').textContent = 'Quantity';
      document.getElementById('colUnitLabel').textContent = 'Unit';
      document.getElementById('colPctLabel').textContent = '% of Total';
      document.getElementById('colCalcLabel').classList.add('hidden');
      document.getElementById('panelTitle').textContent = 'Enter quantities — percentages calculated automatically';
    } else {
      document.getElementById('colQtyLabel').textContent = '% of Formula';
      document.getElementById('colUnitLabel').textContent = '';
      document.getElementById('colPctLabel').textContent = '% (visual)';
      document.getElementById('colCalcLabel').classList.remove('hidden');
      document.getElementById('panelTitle').textContent = 'Enter percentages + batch size — quantities calculated automatically';
    }

    // Rebuild table for mode switch (not during typing)
    rebuildTable();
    recalc();
  }

  /* ─── Row management ─── */
  function addRow() {
    const id = nextId++;
    rows.push({ id, name: '', val: '', unit: 'g' });
    appendRowToDOM(rows[rows.length - 1]);
    recalc();
    // Focus the name field of the new row
    const nameInput = document.querySelector(`[data-name-id="${id}"]`);
    if (nameInput) nameInput.focus();
  }

  function removeRow(id) {
    rows = rows.filter(r => r.id !== id);
    const tr = document.querySelector(`tr[data-row-id="${id}"]`);
    if (tr) tr.remove();
    // Renumber
    document.querySelectorAll('tbody tr').forEach((tr, i) => {
      const num = tr.querySelector('.row-num');
      if (num) num.textContent = String(i + 1).padStart(2, '0');
    });
    recalc();
  }

  function clearAll() {
    rows = []; nextId = 1;
    document.getElementById('batchSize').value = '';
    document.getElementById('tbody').innerHTML = '';
    recalc();
  }

  /* ─── Build a single <tr> and append it — called once per row ─── */
  function appendRowToDOM(row) {
    const tbody = document.getElementById('tbody');
    const idx   = rows.length - 1;

    const tr = document.createElement('tr');
    tr.dataset.rowId = row.id;

    // #
    const tdNum = document.createElement('td');
    tdNum.className = 'row-num';
    tdNum.textContent = String(idx + 1).padStart(2, '0');
    tr.appendChild(tdNum);

    // Name
    const tdName = document.createElement('td');
    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.className = 'cell-input name-input';
    nameInput.placeholder = 'e.g. Cetyl Alcohol, Phase A…';
    nameInput.value = row.name;
    nameInput.dataset.nameId = row.id;
    nameInput.addEventListener('input', () => { row.name = nameInput.value; });
    tdName.appendChild(nameInput);
    tr.appendChild(tdName);

    // Value
    const tdVal = document.createElement('td');
    const valInput = document.createElement('input');
    valInput.type = 'text';
    valInput.inputMode = 'decimal';
    valInput.className = 'cell-input num-input';
    valInput.placeholder = '0';
    valInput.value = row.val;
    valInput.dataset.valId = row.id;
    // Update data + recalc only on input — NO keydown blocking
    valInput.addEventListener('input', () => {
      row.val = valInput.value;
      recalc();
    });
    // Sanitize only when user leaves the field
    valInput.addEventListener('blur', () => {
      sanitizeOnBlur(valInput);
      row.val = valInput.value;
      recalc();
    });
    tdVal.appendChild(valInput);
    tr.appendChild(tdVal);

    // Unit / label
    const tdUnit = document.createElement('td');
    tdUnit.style.textAlign = 'center';
    tdUnit.dataset.unitCell = row.id;
    if (mode === 'qty') {
      const sel = document.createElement('select');
      sel.className = 'row-unit';
      ['g','kg','oz','lb','mL','L','%'].forEach(u => {
        const opt = document.createElement('option');
        opt.value = u; opt.textContent = u;
        if (row.unit === u) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => { row.unit = sel.value; recalc(); });
      tdUnit.appendChild(sel);
    } else {
      const lbl = document.createElement('span');
      lbl.style.cssText = 'color:var(--brown);font-weight:700;font-size:12px';
      lbl.textContent = '%';
      tdUnit.appendChild(lbl);
    }
    tr.appendChild(tdUnit);

    // % display
    const tdPct = document.createElement('td');
    const pctWrap = document.createElement('div');
    pctWrap.className = 'pct-bar-wrap';
    const pctSpan = document.createElement('span');
    pctSpan.className = 'cell-readonly';
    pctSpan.dataset.pctSpan = row.id;
    pctSpan.textContent = '0.00%';
    const barOuter = document.createElement('div');
    barOuter.className = 'pct-bar';
    const barInner = document.createElement('div');
    barInner.className = 'pct-bar-fill';
    barInner.dataset.pctBar = row.id;
    barInner.style.width = '0%';
    barOuter.appendChild(barInner);
    pctWrap.appendChild(pctSpan);
    pctWrap.appendChild(barOuter);
    tdPct.appendChild(pctWrap);
    tr.appendChild(tdPct);

    // Batch qty (pct mode only)
    const tdBatch = document.createElement('td');
    tdBatch.classList.toggle('hidden', mode !== 'pct');
    const batchSpan = document.createElement('span');
    batchSpan.className = 'cell-readonly';
    batchSpan.dataset.batchSpan = row.id;
    batchSpan.textContent = '—';
    tdBatch.appendChild(batchSpan);
    tr.appendChild(tdBatch);

    // Delete
    const tdDel = document.createElement('td');
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.title = 'Remove';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => removeRow(row.id));
    tdDel.appendChild(delBtn);
    tr.appendChild(tdDel);

    tbody.appendChild(tr);
  }

  /* ─── Rebuild entire table (only on mode switch, not on typing) ─── */
  function rebuildTable() {
    document.getElementById('tbody').innerHTML = '';
    rows.forEach(r => appendRowToDOM(r));
  }

  /* ─── Recalc: only update display cells, never touch inputs ─── */
  function recalc() {
    const batchVal  = parseVal(document.getElementById('batchSize').value);
    const batchUnit = document.getElementById('batchUnit').value;

    let totalQty = 0, totalPct = 0;
    rows.forEach(r => {
      const v = parseVal(r.val);
      if (mode === 'qty') totalQty += v; else totalPct += v;
    });

    rows.forEach(r => {
      const v   = parseVal(r.val);
      const pct = mode === 'qty'
        ? (totalQty > 0 ? v / totalQty * 100 : 0)
        : v;
      const bQty = (mode === 'pct' && batchVal > 0) ? v / 100 * batchVal : 0;

      const pctSpan  = document.querySelector(`[data-pct-span="${r.id}"]`);
      const pctBar   = document.querySelector(`[data-pct-bar="${r.id}"]`);
      const batchSpan = document.querySelector(`[data-batch-span="${r.id}"]`);

      if (pctSpan)  pctSpan.textContent = fmt(pct) + '%';
      if (pctBar)   pctBar.style.width  = Math.min(Math.max(pct, 0), 100) + '%';
      if (batchSpan) {
        batchSpan.textContent = bQty > 0 ? fmt(bQty) + ' ' + batchUnit : '—';
        const td = batchSpan.closest('td');
        if (td) td.classList.toggle('hidden', mode !== 'pct');
      }
    });

    updateSummary(totalQty, totalPct, batchVal, batchUnit);
  }

  function updateSummary(totalQty, totalPct, batchVal, batchUnit) {
    const statTotal = document.getElementById('statTotal');
    const statPct   = document.getElementById('statPct');
    const statCount = document.getElementById('statCount');
    const statBatch = document.getElementById('statBatch');
    const warnBar   = document.getElementById('warnBar');

    statCount.textContent = rows.length;

    if (mode === 'qty') {
      const unit = rows.length > 0 ? rows[0].unit || 'g' : 'g';
      statTotal.innerHTML = `${fmt(totalQty)} <span>${unit}</span>`;
      statTotal.className = 'stat-value';
      statPct.textContent = rows.length ? '100.00%' : '—';
      statPct.className = 'stat-value ok';
      warnBar.classList.remove('show');
    } else {
      statTotal.textContent = rows.length ? fmt(totalPct) + '%' : '—';
      const diff = Math.abs(totalPct - 100);
      if (!rows.length) {
        statPct.textContent = '—'; statPct.className = 'stat-value';
        warnBar.classList.remove('show');
      } else if (diff < 0.005) {
        statPct.textContent = '100.00% ✓'; statPct.className = 'stat-value ok';
        warnBar.classList.remove('show');
      } else {
        statPct.textContent = fmt(totalPct) + '%'; statPct.className = 'stat-value warn';
        warnBar.classList.add('show');
        warnBar.textContent = totalPct > 100
          ? `⚠ Total is ${fmt(totalPct - 100)}% over 100%. Adjust your percentages.`
          : `⚠ Total is ${fmt(100 - totalPct)}% under 100%. Formula is incomplete.`;
      }
      statBatch.innerHTML = batchVal > 0 ? `${fmt(batchVal)} <span>${batchUnit}</span>` : '—';
    }
  }

  /* ─── Wire up persistent controls ─── */
  document.getElementById('batchSize').addEventListener('input', recalc);
  document.getElementById('batchSize').addEventListener('blur', function() {
    sanitizeOnBlur(this); recalc();
  });
  document.getElementById('batchUnit').addEventListener('change', recalc);

  /* ─── Seed rows ─── */
  addRow(); addRow(); addRow();
</script>
</body>
</html>
